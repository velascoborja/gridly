<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridly Mobile Layout Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .stripe-shadow {
            box-shadow: rgba(50,50,93,0.15) 0px 30px 45px -30px, rgba(0,0,0,0.08) 0px 18px 36px -18px;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center p-8 gap-12">

    <div class="flex flex-col gap-4 w-full max-w-sm">
        <h2 class="text-xl font-semibold text-gray-900">Current Mobile Layout</h2>
        <div class="border border-gray-200 bg-white rounded-xl overflow-hidden shadow-sm aspect-[9/16] relative">
            <!-- Header -->
            <div class="border-b p-4 flex flex-col gap-4">
                <div class="flex items-center gap-2 self-center">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg shadow-lg flex items-center justify-center">
                        <span class="text-white text-xs">G</span>
                    </div>
                    <span class="font-semibold text-lg">Gridly</span>
                </div>
                <div class="flex flex-col gap-3">
                    <div class="flex justify-center gap-3">
                        <div class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                        <div class="px-4 py-1.5 rounded-full border border-gray-200 text-sm font-medium">Cerrar sesión</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="h-9 border border-gray-200 rounded-lg bg-gray-50 flex items-center px-3 text-xs text-gray-500">2026</div>
                        <div class="h-9 border border-gray-200 rounded-lg bg-gray-50 flex items-center px-3 text-xs text-gray-500">Abril</div>
                    </div>
                    <div class="h-9 border border-gray-200 rounded-lg bg-gray-50"></div>
                </div>
            </div>
            <!-- Content -->
            <div class="p-4 flex flex-col gap-4">
                <div class="h-24 bg-gray-50 rounded-xl border border-dashed border-gray-200"></div>
                <div class="h-48 bg-gray-50 rounded-xl border border-dashed border-gray-200"></div>
            </div>
        </div>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-sm">
        <h2 class="text-xl font-semibold text-gray-900">Option A: Fixed Bottom Bar</h2>
        <div class="border border-gray-200 bg-white rounded-xl overflow-hidden shadow-sm aspect-[9/16] relative flex flex-col">
            <!-- Header -->
            <div class="border-b p-4 flex flex-col gap-4">
                <div class="flex items-center gap-2 self-center">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg shadow-lg flex items-center justify-center">
                        <span class="text-white text-xs">G</span>
                    </div>
                    <span class="font-semibold text-lg">Gridly</span>
                </div>
                <div class="flex flex-col gap-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="h-9 border border-gray-200 rounded-lg bg-gray-50 flex items-center px-3 text-xs text-gray-500">2026</div>
                        <div class="h-9 border border-gray-200 rounded-lg bg-gray-50 flex items-center px-3 text-xs text-gray-500">Abril</div>
                    </div>
                    <div class="h-9 border border-gray-200 rounded-lg bg-gray-50"></div>
                </div>
            </div>
            <!-- Content -->
            <div class="p-4 flex flex-col gap-4 flex-1">
                <div class="h-24 bg-gray-50 rounded-xl border border-dashed border-gray-200"></div>
                <div class="h-48 bg-gray-50 rounded-xl border border-dashed border-gray-200"></div>
            </div>
            <!-- Bottom Bar -->
            <div class="mt-auto border-t bg-white/80 backdrop-blur-md p-4 flex justify-center items-center gap-4 sticky bottom-0">
                <div class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 bg-white shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <div class="px-6 py-2 rounded-full bg-indigo-600 text-white text-sm font-medium shadow-md">Cerrar sesión</div>
            </div>
        </div>
    </div>

</body>
</html>
